name: Deploy Queensland dam display

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "favicon.svg"
      - "css/**"
      - "js/**"
      - "images/**"
      - "assets/**"
      - "data/qld_lga_boundaries.kmz"
      - ".github/workflows/deploy-dam-display.yml"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy existing site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
