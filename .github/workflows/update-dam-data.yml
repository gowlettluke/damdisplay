name: Update Queensland dam data

on:
  workflow_dispatch:
    inputs:
      full_history:
        description: "Force a full 400-day history refresh"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-build:
    name: Collect and upload site artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install collector dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Collect current and historical dam data
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.full_history || 'false' }}" == "true" ]]; then
            EXTRA_ARGS+=(--force-full-history)
          fi
          python scripts/update_dam_data.py \
            --history-days 400 \
            --retention-days 730 \
            --incremental-overlap-days 3 \
            --full-refresh-interval-days 7 \
            --verbose \
            "${EXTRA_ARGS[@]}"

      - name: Validate published data
        run: python scripts/validate_data.py

      - name: Commit refreshed data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Keep the workflow checkout current before committing generated data.
          # Scheduled runs can otherwise fail with a non-fast-forward push when
          # someone has pushed to main since this job checked out the repo.
          git pull --rebase --autostash origin main

          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Queensland dam data"
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              if [[ "$attempt" == "3" ]]; then
                echo "Failed to push refreshed data after $attempt attempts." >&2
                exit 1
              fi
              echo "Push was rejected, rebasing onto latest main and retrying..."
              git pull --rebase origin main
            done
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: Deploy refreshed site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-and-build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Check out latest repository data
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python for health check
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fail run if a required source failed
        run: python scripts/check_provider_health.py
